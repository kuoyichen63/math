<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學特訓 FPS</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; /* 預設天空藍 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        /* 遊戲介面 (HUD) */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
        }

        /* 準星 */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }

        /* 分數面板 */
        #score-board {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border: 2px solid #fff;
            border-radius: 5px;
        }

        /* 武器升級提示文字 */
        #upgrade-msg {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            color: #ffd700;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 20px #ff8800, 2px 2px 5px #000;
            opacity: 0;
            transition: all 0.3s ease-out;
            pointer-events: none;
        }

        /* 遊戲開始畫面 */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 20, 40, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
        }

        #start-screen h1 {
            font-size: 48px;
            color: #ffd700;
            text-shadow: 0 0 20px #ffaa00;
            margin-bottom: 10px;
        }

        #instructions {
            font-size: 18px;
            color: #eee;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .key-btn {
            display: inline-block;
            background: #333;
            border: 1px solid #555;
            padding: 2px 8px;
            border-radius: 4px;
            color: #fff;
            margin: 0 3px;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 24px;
            background-color: transparent;
            color: #ffd700;
            border: 2px solid #ffd700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-shadow: 0 0 5px #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        #start-btn:hover {
            background-color: rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
        }

        /* 答錯時的紅光特效 */
        #damage-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 0, 0, 0);
            pointer-events: none;
            transition: background-color 0.1s;
        }

        /* 手機虛擬控制介面 */
        #mobile-controls {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
            display: none; /* 預設隱藏，若為觸控裝置則顯示 */
        }
        #joystick-base {
            position: absolute;
            bottom: 40px; left: 40px;
            width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            pointer-events: none; /* 動態搖桿，初始不阻擋 */
        }
        #joystick-stick {
            position: absolute;
            top: 50%; left: 50%;
            width: 60px; height: 60px;
            margin-left: -30px; margin-top: -30px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        #fire-btn {
            position: absolute;
            bottom: 40px; right: 40px;
            width: 90px; height: 90px;
            background: rgba(255, 50, 50, 0.4);
            border: 2px solid rgba(255, 100, 100, 0.7);
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 18px;
            pointer-events: auto;
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }
        #fire-btn:active {
            background: rgba(255, 50, 50, 0.8);
        }
    </style>
    
    <!-- 引入 Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="game-container"></div>
    
    <div id="damage-overlay"></div>

    <div id="hud">
        <div id="crosshair"></div>
        <div id="score-board">分數: <span id="score">0</span></div>
        <div id="upgrade-msg">武器升級！</div>
    </div>

    <!-- 手機虛擬控制器 -->
    <div id="mobile-controls">
        <div id="joystick-base"><div id="joystick-stick"></div></div>
        <div id="fire-btn">射擊</div>
    </div>

    <div id="start-screen">
        <h1>荒野數學 FPS</h1>
        <div id="instructions">
            在白天的荒野中生存，每 50 分武器將自動升級！<br><br>
            <b style="color:#00ffff">青色機器人</b> 考加減法，<b style="color:#ff4444">紅色機器人</b> 考九九乘法。<br>
            胸口、左腳、右腳各有一個數字。<br>
            請射擊 <b style="color:#ffd700">正確答案</b> 的數字方塊。<br><br>
            控制方式：<br>
            <span class="key-btn">W</span><span class="key-btn">A</span><span class="key-btn">S</span><span class="key-btn">D</span> 移動<br>
            <span class="key-btn">滑鼠</span> 瞄準與射擊
        </div>
        <button id="start-btn">點擊開始遊戲</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- 全域變數設定 ---
        let camera, scene, renderer, controls;
        let score = 0;
        let weaponLevel = 0; // 武器等級
        let gunGroup = null; // 當前武器模組
        const robots = []; 
        const targetMeshes = []; 
        let raycaster;
        
        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;
        
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let prevTime = performance.now();

        // 手機控制與遊戲狀態變數
        let isPlaying = false;
        let isMobile = false;
        let joystickData = { x: 0, y: 0 };

        // 音效系統變數
        let audioCtx;
        let lastStepTime = 0;

        // 遊戲設定參數
        const GAME_SPEED = 3.0; 
        const SPAWN_DISTANCE = 35; 
        const MAX_ROBOTS = 4; // 稍微增加敵人數

        init();
        animate();

        function init() {
            // 1. 初始化場景 (白天荒野設定)
            scene = new THREE.Scene();
            scene.background = new THREE.Color( 0x87CEEB ); // 天空藍
            scene.fog = new THREE.FogExp2( 0x87CEEB, 0.015 ); // 遠處天空霧氣

            camera = new THREE.PerspectiveCamera( 75, window.innerWidth / window.innerHeight, 0.1, 1000 );
            camera.position.y = 1.6; 
            scene.add(camera); 

            // 初始化武器 (等級 0)
            buildWeapon(weaponLevel);

            // 3. 初始化燈光 (白天陽光)
            const ambientLight = new THREE.AmbientLight( 0xffffff, 0.6 ); 
            scene.add( ambientLight );
            
            const dirLight = new THREE.DirectionalLight( 0xfffae6, 1.2 ); // 偏黃的陽光
            dirLight.position.set( 50, 100, 20 );
            dirLight.castShadow = true;
            scene.add( dirLight );

            // 4. 建立環境 (荒野地面與石頭)
            // 泥土/荒野地面
            const groundGeo = new THREE.PlaneGeometry( 500, 500 );
            const groundMat = new THREE.MeshStandardMaterial( { color: 0x8b7355, roughness: 1.0 } );
            const ground = new THREE.Mesh( groundGeo, groundMat );
            ground.rotation.x = -Math.PI / 2;
            scene.add( ground );

            // 隨機生成石頭
            const rockGeo = new THREE.DodecahedronGeometry( 1, 1 );
            const rockMat = new THREE.MeshStandardMaterial( { color: 0x666666, roughness: 0.9 } );
            for(let i=0; i<80; i++) {
                const rock = new THREE.Mesh( rockGeo, rockMat );
                const scale = 1 + Math.random() * 4;
                rock.scale.set( scale, scale * (0.5 + Math.random()), scale ); // 形狀壓扁或拉長
                // 避開中央玩家初始區域
                let rx, rz;
                do {
                    rx = (Math.random() - 0.5) * 300;
                    rz = (Math.random() - 0.5) * 300;
                } while(Math.abs(rx) < 10 && Math.abs(rz) < 10);
                
                rock.position.set( rx, scale/2 - 0.5, rz );
                // 隨機旋轉石頭
                rock.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                scene.add( rock );
            }

            // 5. 初始化渲染器
            const container = document.getElementById( 'game-container' );
            renderer = new THREE.WebGLRenderer( { antialias: true } );
            renderer.setPixelRatio( window.devicePixelRatio );
            renderer.setSize( window.innerWidth, window.innerHeight );
            container.appendChild( renderer.domElement );

            // 設備偵測 (判斷是否為觸控設備)
            isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || navigator.maxTouchPoints > 0;

            // 6. 控制器設定
            controls = new PointerLockControls( camera, document.body );
            const startScreen = document.getElementById( 'start-screen' );
            const startBtn = document.getElementById( 'start-btn' );
            const hud = document.getElementById( 'hud' );
            const mobileControls = document.getElementById('mobile-controls');

            if (isMobile) {
                document.getElementById('instructions').innerHTML += '<br><br><b style="color:#ffd700">手機模式：左半畫面滑動移動，右半畫面滑動視角，點擊射擊按鈕。</b>';
                startBtn.innerText = '觸控開始遊戲';
            }

            startBtn.addEventListener( 'click', function () {
                initAudio(); 
                if (isMobile) {
                    isPlaying = true;
                    startScreen.style.display = 'none';
                    hud.style.display = 'block';
                    mobileControls.style.display = 'block';
                    setupTouchControls();
                    // 嘗試進入全螢幕以獲得最佳體驗
                    if (document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen().catch(()=>{});
                    }
                } else {
                    controls.lock(); 
                }
            } );

            controls.addEventListener( 'lock', function () {
                isPlaying = true;
                startScreen.style.display = 'none';
                hud.style.display = 'block';
            } );

            controls.addEventListener( 'unlock', function () {
                isPlaying = false;
                startScreen.style.display = 'flex';
                hud.style.display = 'none';
            } );

            scene.add( controls.getObject() );

            // 鍵盤事件監聽
            const onKeyDown = function ( event ) {
                switch ( event.code ) {
                    case 'ArrowUp':
                    case 'KeyW': moveForward = true; break;
                    case 'ArrowLeft':
                    case 'KeyA': moveLeft = true; break;
                    case 'ArrowDown':
                    case 'KeyS': moveBackward = true; break;
                    case 'ArrowRight':
                    case 'KeyD': moveRight = true; break;
                }
            };

            const onKeyUp = function ( event ) {
                switch ( event.code ) {
                    case 'ArrowUp':
                    case 'KeyW': moveForward = false; break;
                    case 'ArrowLeft':
                    case 'KeyA': moveLeft = false; break;
                    case 'ArrowDown':
                    case 'KeyS': moveBackward = false; break;
                    case 'ArrowRight':
                    case 'KeyD': moveRight = false; break;
                }
            };

            document.addEventListener( 'keydown', onKeyDown );
            document.addEventListener( 'keyup', onKeyUp );

            // 7. 射擊機制 
            raycaster = new THREE.Raycaster();
            document.addEventListener( 'mousedown', (e) => {
                if (!isMobile) onShoot(); 
            });
            window.addEventListener( 'resize', onWindowResize );

            for(let i=0; i<MAX_ROBOTS; i++) {
                spawnRobot();
            }
        }

        // --- 手機觸控邏輯設定 ---
        function setupTouchControls() {
            const stick = document.getElementById('joystick-stick');
            const base = document.getElementById('joystick-base');
            const fireBtn = document.getElementById('fire-btn');

            let moveTouch = { id: null, startX: 0, startY: 0 };
            let lookTouch = { id: null, lastX: 0, lastY: 0 };
            const maxJoyDist = 60; // 搖桿最大移動距離

            document.addEventListener('touchstart', (e) => {
                if (!isPlaying) return;
                e.preventDefault(); // 防止畫面滾動縮放

                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    
                    if (touch.target === fireBtn) {
                        onShoot();
                    } else if (touch.clientX < window.innerWidth / 2 && moveTouch.id === null) {
                        // 左半螢幕：移動搖桿
                        moveTouch.id = touch.identifier;
                        moveTouch.startX = touch.clientX;
                        moveTouch.startY = touch.clientY;
                        
                        // 動態將搖桿底座移到手指按下的位置
                        base.style.left = (touch.clientX - 60) + 'px';
                        base.style.top = (touch.clientY - 60) + 'px';
                        base.style.bottom = 'auto';
                        stick.style.transform = `translate(0px, 0px)`;
                    } else if (touch.clientX >= window.innerWidth / 2 && lookTouch.id === null) {
                        // 右半螢幕：旋轉視角
                        lookTouch.id = touch.identifier;
                        lookTouch.lastX = touch.clientX;
                        lookTouch.lastY = touch.clientY;
                    }
                }
            }, { passive: false });

            document.addEventListener('touchmove', (e) => {
                if (!isPlaying) return;
                e.preventDefault();

                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    
                    if (touch.identifier === moveTouch.id) {
                        // 處理搖桿移動
                        let deltaX = touch.clientX - moveTouch.startX;
                        let deltaY = touch.clientY - moveTouch.startY;
                        const dist = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                        
                        if (dist > maxJoyDist) {
                            deltaX = (deltaX / dist) * maxJoyDist;
                            deltaY = (deltaY / dist) * maxJoyDist;
                        }
                        
                        stick.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
                        
                        // 將搖桿位移正規化到 -1 ~ 1 之間
                        joystickData.x = deltaX / maxJoyDist;
                        joystickData.y = deltaY / maxJoyDist;
                        
                    } else if (touch.identifier === lookTouch.id) {
                        // 處理視角旋轉
                        const deltaX = touch.clientX - lookTouch.lastX;
                        const deltaY = touch.clientY - lookTouch.lastY;
                        lookTouch.lastX = touch.clientX;
                        lookTouch.lastY = touch.clientY;

                        // 模仿 PointerLockControls 的旋轉邏輯
                        const euler = new THREE.Euler( 0, 0, 0, 'YXZ' );
                        euler.setFromQuaternion( camera.quaternion );
                        euler.y -= deltaX * 0.005; // 水平靈敏度
                        euler.x -= deltaY * 0.005; // 垂直靈敏度
                        euler.x = Math.max( - Math.PI / 2, Math.min( Math.PI / 2, euler.x ) ); // 限制上下仰角
                        camera.quaternion.setFromEuler( euler );
                    }
                }
            }, { passive: false });

            const handleTouchEnd = (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    if (touch.identifier === moveTouch.id) {
                        // 搖桿放開
                        moveTouch.id = null;
                        joystickData.x = 0;
                        joystickData.y = 0;
                        stick.style.transform = `translate(0px, 0px)`;
                        // 搖桿底座歸位
                        base.style.left = '40px';
                        base.style.bottom = '40px';
                        base.style.top = 'auto';
                    } else if (touch.identifier === lookTouch.id) {
                        // 視角旋轉放開
                        lookTouch.id = null;
                    }
                }
            };

            document.addEventListener('touchend', handleTouchEnd);
            document.addEventListener('touchcancel', handleTouchEnd);
        }

        // 建立/升級 武器模型
        function buildWeapon(level) {
            if (gunGroup) {
                camera.remove(gunGroup); // 移除舊武器
            }
            
            gunGroup = new THREE.Group();
            const gunMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.3, metalness: 0.9 });
            
            // 根據等級設定發光顏色
            let glowColor = 0x00ffff; // Lv0: 青
            if (level === 1) glowColor = 0x00ff00; // Lv1: 綠
            else if (level === 2) glowColor = 0xaa00ff; // Lv2: 紫
            else if (level >= 3) glowColor = 0xff4400; // Lv3+: 橘紅

            const glowMat = new THREE.MeshStandardMaterial({ color: 0x000000, emissive: glowColor, emissiveIntensity: 0.8 });

            if (level === 0) {
                // Lv.1 (0-49): 單管手槍
                const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.8, 16), gunMat);
                barrel.rotation.x = Math.PI / 2;
                barrel.position.set(0, 0, -0.4);
                const glow = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.1, 0.4), glowMat);
                glow.position.set(0, 0, -0.2);
                gunGroup.add(barrel, glow);

            } else if (level === 1) {
                // Lv.2 (50-99): 雙管步槍
                const b1 = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.9, 16), gunMat);
                b1.rotation.x = Math.PI / 2; b1.position.set(-0.06, 0, -0.45);
                const b2 = b1.clone(); b2.position.set(0.06, 0, -0.45);
                const glow = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.12, 0.5), glowMat);
                glow.position.set(0, 0, -0.2);
                gunGroup.add(b1, b2, glow);

            } else if (level === 2) {
                // Lv.3 (100-149): 三管機槍
                const b1 = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1.0, 16), gunMat);
                b1.rotation.x = Math.PI / 2; b1.position.set(0, 0.07, -0.5);
                const b2 = b1.clone(); b2.position.set(-0.07, -0.05, -0.5);
                const b3 = b1.clone(); b3.position.set(0.07, -0.05, -0.5);
                const glow = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.4, 8), glowMat);
                glow.rotation.x = Math.PI / 2; glow.position.set(0, 0, -0.2);
                gunGroup.add(b1, b2, b3, glow);

            } else {
                // Lv.4+ (150+): 重型破壞砲
                const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.12, 1.2, 16), gunMat);
                barrel.rotation.x = Math.PI / 2;
                barrel.position.set(0, 0, -0.6);
                const glow = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.4, 16), glowMat);
                glow.rotation.x = Math.PI / 2;
                glow.position.set(0, 0, -0.2);
                gunGroup.add(barrel, glow);
            }

            gunGroup.position.set(0.4, -0.3, -0.5);
            camera.add(gunGroup);
        }

        // 檢查並觸發武器升級
        function checkWeaponUpgrade() {
            // 每 50 分為一個等級
            const newLevel = Math.max(0, Math.floor(score / 50));
            
            if (newLevel !== weaponLevel) {
                weaponLevel = newLevel;
                buildWeapon(weaponLevel);
                
                // 顯示升級 UI 提示
                const msg = document.getElementById('upgrade-msg');
                msg.innerText = `武器升級！ (Lv.${weaponLevel + 1})`;
                msg.style.opacity = 1;
                msg.style.transform = 'translate(-50%, -50%) scale(1.2)';
                msg.style.color = weaponLevel >= 3 ? '#ff4400' : (weaponLevel === 2 ? '#aa00ff' : '#00ff00');
                
                // 2秒後淡出
                setTimeout(() => {
                    msg.style.opacity = 0;
                    msg.style.transform = 'translate(-50%, -50%) scale(1)';
                }, 2000);
            }
        }

        function createTextPlane(text, width, height, textColor, bgColor, fontSize, isTarget = false, value = null, isCorrect = false) {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; 
            canvas.height = Math.round(1024 * (height / width));
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (isTarget) {
                ctx.strokeStyle = textColor; // 根據文字顏色決定邊框顏色
                ctx.lineWidth = 20;
                ctx.strokeRect(0, 0, canvas.width, canvas.height);
            }

            ctx.font = `bold ${fontSize}px 'Courier New', Courier, monospace`;
            let textWidth = ctx.measureText(text).width;
            if (textWidth > canvas.width * 0.9) {
                fontSize = fontSize * (canvas.width * 0.9 / textWidth);
                ctx.font = `bold ${fontSize}px 'Courier New', Courier, monospace`;
            }

            ctx.fillStyle = textColor;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);

            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.MeshBasicMaterial({ map: texture, transparent: false });
            const geometry = new THREE.PlaneGeometry(width, height);
            const mesh = new THREE.Mesh(geometry, material);

            if (isTarget) {
                mesh.userData = { isTarget: true, value: value, isCorrect: isCorrect };
            }

            return mesh;
        }

        // 音效系統
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 依據武器等級播放不同射擊聲
        function playShootSound(level) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            let freqStart = 800, freqEnd = 100, dur = 0.15, vol = 0.08;
            osc.type = 'square';

            if (level === 1) { 
                osc.type = 'sawtooth'; freqStart = 600; freqEnd = 150; 
            } else if (level === 2) { 
                osc.type = 'square'; freqStart = 1000; freqEnd = 200; dur = 0.1; vol = 0.06;
            } else if (level >= 3) { 
                osc.type = 'triangle'; freqStart = 300; freqEnd = 40; dur = 0.3; vol = 0.2; 
            }

            osc.frequency.setValueAtTime(freqStart, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freqEnd, audioCtx.currentTime + dur);
            
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        }

        function playCorrectSound() {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            const playNote = (freq, time, duration) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.1, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + duration);
                osc.start(time);
                osc.stop(time + duration);
            };
            playNote(440, t, 0.1);
            playNote(554, t + 0.1, 0.1);
            playNote(659, t + 0.2, 0.2); 
        }

        function playWrongSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function playStepSound(time) {
            if (!audioCtx || time - lastStepTime < 400) return; 
            lastStepTime = time;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime); // 配合荒野泥土地，調低頻率
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function generateMathProblem() {
            const isAddition = Math.random() > 0.5;
            let a, b, correctAns, str;

            if (isAddition) {
                a = Math.floor(Math.random() * 10) + 1; 
                b = Math.floor(Math.random() * 10) + 1; 
                correctAns = a + b;
                str = `${a}+${b}=?`;
            } else {
                a = Math.floor(Math.random() * 10) + 10; 
                b = Math.floor(Math.random() * 9) + 1;  
                correctAns = a - b;
                str = `${a}-${b}=?`;
            }

            let wrong1 = correctAns + (Math.floor(Math.random() * 3) + 1) * (Math.random()>0.5?1:-1);
            let wrong2 = correctAns + (Math.floor(Math.random() * 3) + 1) * (Math.random()>0.5?1:-1);
            
            while (wrong1 === correctAns || wrong1 < 0) wrong1++;
            while (wrong2 === correctAns || wrong2 === wrong1 || wrong2 < 0) wrong2++;

            const answers = [
                { val: correctAns, isCorrect: true },
                { val: wrong1, isCorrect: false },
                { val: wrong2, isCorrect: false }
            ];
            answers.sort(() => Math.random() - 0.5);

            return { equationStr: str, answers: answers };
        }

        // 產生九九乘法題目與答案
        function generateMultiplicationProblem() {
            const a = Math.floor(Math.random() * 9) + 1; // 1-9
            const b = Math.floor(Math.random() * 9) + 1; // 1-9
            const correctAns = a * b;
            const str = `${a}x${b}=?`;

            // 產生兩個錯誤答案
            let wrong1 = correctAns + (Math.floor(Math.random() * 5) + 1) * (Math.random() > 0.5 ? 1 : -1);
            let wrong2 = correctAns + (Math.floor(Math.random() * 5) + 1) * (Math.random() > 0.5 ? 1 : -1);
            
            while (wrong1 === correctAns || wrong1 <= 0) wrong1++;
            while (wrong2 === correctAns || wrong2 === wrong1 || wrong2 <= 0) wrong2++;

            const answers = [
                { val: correctAns, isCorrect: true },
                { val: wrong1, isCorrect: false },
                { val: wrong2, isCorrect: false }
            ];
            answers.sort(() => Math.random() - 0.5);

            return { equationStr: str, answers: answers };
        }

        function spawnRobot() {
            const isRedRobot = Math.random() > 0.5; // 50% 機率生成紅色乘法機器人
            const robotGroup = new THREE.Group();
            
            // 根據機器人種類設定材質發光顏色
            const robotMat = new THREE.MeshStandardMaterial({ 
                color: isRedRobot ? 0xff3333 : 0x00ffff, 
                emissive: isRedRobot ? 0xcc0000 : 0x00aaff, 
                emissiveIntensity: 0.8,
                roughness: 0.4
            });

            // 身體 (Torso)
            const torso = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.5, 0.6), robotMat);
            torso.position.y = 1.5;
            robotGroup.add(torso);

            // 頭 (Head)
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), robotMat);
            head.position.y = 2.8;
            robotGroup.add(head);
            
            // 眼睛
            const eyeMat = new THREE.MeshBasicMaterial({color: 0xffffff});
            const eye1 = new THREE.Mesh(new THREE.PlaneGeometry(0.15, 0.15), eyeMat);
            eye1.position.set(0.2, 2.9, 0.41);
            const eye2 = new THREE.Mesh(new THREE.PlaneGeometry(0.15, 0.15), eyeMat);
            eye2.position.set(-0.2, 2.9, 0.41);
            robotGroup.add(eye1);
            robotGroup.add(eye2);

            // 腳
            const legGeo = new THREE.BoxGeometry(0.4, 1.2, 0.4);
            legGeo.translate(0, -0.6, 0); 
            const legL = new THREE.Mesh(legGeo, robotMat);
            legL.position.set(-0.35, 1.2, 0); 
            const legR = new THREE.Mesh(legGeo, robotMat);
            legR.position.set(0.35, 1.2, 0);
            robotGroup.add(legL);
            robotGroup.add(legR);

            // 手
            const armGeo = new THREE.BoxGeometry(0.3, 1.4, 0.3);
            armGeo.translate(0, -0.7, 0); 
            const armL = new THREE.Mesh(armGeo, robotMat);
            armL.position.set(-0.8, 2.2, 0); 
            const armR = new THREE.Mesh(armGeo, robotMat);
            armR.position.set(0.8, 2.2, 0);
            robotGroup.add(armL);
            robotGroup.add(armR);

            robotGroup.userData = {
                legL: legL, legR: legR, armL: armL, armR: armR,
                walkPhase: Math.random() * Math.PI * 2 
            };

            // 決定數學題目與標籤顏色
            const problem = isRedRobot ? generateMultiplicationProblem() : generateMathProblem();
            const textColor = isRedRobot ? '#ffff00' : '#ff0000'; // 紅色機器人配黃字，青色機器人配紅字

            const equationLabel = createTextPlane(problem.equationStr, 4, 0.8, textColor, '#000000', 300);
            equationLabel.position.set(0, 4.0, 0);
            robotGroup.add(equationLabel);

            const targetWidth = 0.8;
            const targetHeight = 0.6;
            
            const ansChest = createTextPlane(problem.answers[0].val.toString(), targetWidth, targetHeight, textColor, '#000000', 250, true, problem.answers[0].val, problem.answers[0].isCorrect);
            ansChest.position.set(0, 1.5, 0.31); 
            ansChest.userData.parentRobot = robotGroup; 
            robotGroup.add(ansChest);
            targetMeshes.push(ansChest); 

            const ansLegR = createTextPlane(problem.answers[1].val.toString(), targetWidth*0.7, targetHeight*0.7, textColor, '#000000', 250, true, problem.answers[1].val, problem.answers[1].isCorrect);
            ansLegR.position.set(0, -0.4, 0.21); 
            ansLegR.userData.parentRobot = robotGroup;
            legR.add(ansLegR); 
            targetMeshes.push(ansLegR);

            const ansArmL = createTextPlane(problem.answers[2].val.toString(), targetWidth*0.7, targetHeight*0.7, textColor, '#000000', 250, true, problem.answers[2].val, problem.answers[2].isCorrect);
            ansArmL.position.set(0, -0.5, 0.16); 
            ansArmL.userData.parentRobot = robotGroup;
            armL.add(ansArmL); 
            targetMeshes.push(ansArmL);

            // 避開中央玩家產生
            let angle, rx, rz;
            do {
                angle = Math.random() * Math.PI * 2;
                rx = Math.cos(angle) * SPAWN_DISTANCE;
                rz = Math.sin(angle) * SPAWN_DISTANCE;
            } while (Math.abs(rx) < 10 && Math.abs(rz) < 10);
            
            robotGroup.position.set(rx, 0, rz);
            scene.add(robotGroup);
            robots.push(robotGroup);
        }

        function destroyRobot(robotGroup) {
            scene.remove(robotGroup);
            robotGroup.traverse((child) => {
                if (child.isMesh) {
                    child.geometry.dispose();
                    if(child.material.map) child.material.map.dispose();
                    child.material.dispose();
                }
            });

            const index = robots.indexOf(robotGroup);
            if (index > -1) robots.splice(index, 1);

            for (let i = targetMeshes.length - 1; i >= 0; i--) {
                if (targetMeshes[i].userData.parentRobot === robotGroup) {
                    targetMeshes.splice(i, 1);
                }
            }
        }

        function onShoot() {
            if (!isPlaying) return; // 統一使用 isPlaying 判斷

            playShootSound(weaponLevel); // 根據等級發聲

            raycaster.setFromCamera( new THREE.Vector2(0, 0), camera );
            const intersects = raycaster.intersectObjects( targetMeshes );

            if ( intersects.length > 0 ) {
                const hitObject = intersects[ 0 ].object;
                
                if (hitObject.userData.isTarget) {
                    if (hitObject.userData.isCorrect) {
                        playCorrectSound(); 
                        destroyRobot(hitObject.userData.parentRobot);
                        
                        score += 10;
                        document.getElementById('score').innerText = score;
                        checkWeaponUpgrade(); // 檢查是否可以升級武器

                        spawnRobot();
                    } else {
                        playWrongSound(); 
                        flashScreenRed();
                    }
                }
            }
        }

        function flashScreenRed() {
            const overlay = document.getElementById('damage-overlay');
            overlay.style.backgroundColor = 'rgba(255, 0, 0, 0.4)';
            setTimeout(() => {
                overlay.style.backgroundColor = 'rgba(255, 0, 0, 0)';
            }, 150);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize( window.innerWidth, window.innerHeight );
        }

        function animate() {
            requestAnimationFrame( animate );

            const time = performance.now();
            const delta = ( time - prevTime ) / 1000;

            if ( isPlaying ) {
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                // 綜合鍵盤與手機虛擬搖桿的輸入
                let inputX = Number( moveRight ) - Number( moveLeft );
                let inputY = Number( moveBackward ) - Number( moveForward );

                if (isMobile) {
                    inputX = joystickData.x;
                    inputY = joystickData.y;
                }

                direction.x = inputX;
                direction.z = inputY;
                
                // 正規化避免斜向走過快
                if (direction.lengthSq() > 1) {
                    direction.normalize(); 
                }

                const playerSpeed = 50.0; 
                velocity.x -= direction.x * playerSpeed * delta;
                velocity.z -= direction.z * playerSpeed * delta;

                // 使用 PointerLockControls 內建的位移方法 (安全且不會導致穿地)
                controls.moveRight( - velocity.x * delta );
                controls.moveForward( - velocity.z * delta );
                
                if(controls.getObject().position.y < 1.6) {
                    controls.getObject().position.y = 1.6;
                }

                if (Math.abs(velocity.x) > 2 || Math.abs(velocity.z) > 2) {
                    playStepSound(time);
                }
            }

            const playerPos = camera.position.clone();
            playerPos.y = 0; 

            for (let i = robots.length - 1; i >= 0; i--) {
                const robot = robots[i];
                
                const targetLook = playerPos.clone();
                targetLook.y = robot.position.y;
                robot.lookAt(targetLook);

                const equationPlane = robot.children.find(c => c.geometry && c.geometry.type === 'PlaneGeometry' && c.position.y > 3);
                if(equationPlane) {
                    equationPlane.lookAt(camera.position);
                }

                robot.translateZ(GAME_SPEED * delta);

                const walkFreq = 5; 
                const walkAmp = 0.6; 
                robot.userData.walkPhase += delta * walkFreq;
                robot.userData.legL.rotation.x = Math.sin(robot.userData.walkPhase) * walkAmp;
                robot.userData.legR.rotation.x = Math.sin(robot.userData.walkPhase + Math.PI) * walkAmp;
                robot.userData.armL.rotation.x = Math.sin(robot.userData.walkPhase + Math.PI) * walkAmp; 
                robot.userData.armR.rotation.x = Math.sin(robot.userData.walkPhase) * walkAmp; 

                const dist = robot.position.distanceTo(playerPos);
                if (dist < 2.5) {
                    playWrongSound(); 
                    flashScreenRed();
                    destroyRobot(robot);
                    spawnRobot();
                    
                    // 被撞擊扣分並降級
                    score = Math.max(0, score - 5);
                    document.getElementById('score').innerText = score;
                    checkWeaponUpgrade(); 
                }
            }

            prevTime = time;
            renderer.render( scene, camera );
        }
    </script>
